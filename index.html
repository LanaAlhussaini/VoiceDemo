<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoiceCtrl — Web Speech API</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <div id="introScreen">
    <div class="intro-blob ib1"></div>
    <div class="intro-blob ib2"></div>
    <div class="intro-blob ib3"></div>

    <div class="intro-content">
      <div class="intro-ring-wrap">
        <canvas id="particleCanvas" width="260" height="260"></canvas>
      </div>
      <div class="intro-divider"></div>

      <div class="intro-meta">
        <div class="intro-uni">King Saud University</div>
        <div class="intro-course">IT329 · Advanced Web Technologies</div>
      </div>
    </div>
  </div>

  <div id="appScreen" class="hidden">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="grid-overlay"></div>
    <div class="ring-wrap">
      <div class="pulse-ring pr1" id="pr1"></div>
      <div class="pulse-ring pr2" id="pr2"></div>

      <div class="ring" id="ring">
        <div class="ring-inner">
          <span class="ring-text"  id="ringText">Hi</span>
          <span class="ring-sub"   id="ringSub"></span>
        </div>
      </div>
    </div>

    <!-- ── Mic button ── -->
    <button class="mic-btn" id="micBtn" onclick="toggleListening()">
      <span id="micLabel">TAP TO SPEAK</span>
    </button>

    <!-- ── Message bar ── -->
    <div class="msg-bar" id="msgBar">choose a voice command to begin</div>

    <!-- ── Commands reference ── -->
    <div class="cmds-wrap">
      <div class="cmds-label">AVAILABLE VOICE COMMANDS</div>
      <div class="cmds-grid">
        <div class="cmd">"hello"</div>
        <div class="cmd">"dark mode"</div>
        <div class="cmd">"light mode"</div>
        <div class="cmd">"change color"</div>
        <div class="cmd">"open google"</div>
        <div class="cmd">"refresh page"</div>
      </div>
    </div>

    <div class="app-footer">King Saud University · College of Computer and Information Sciences</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
